version: 2

project_name: cws

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/null3000/cws-cli/cmd.Version={{.Version}}
    main: .

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: null3000
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://null3000.github.io/cws-cli/"
    description: "A CLI for managing Chrome Web Store extensions"
    license: "MIT"
    install: |
      bin.install "cws"
    test: |
      system "#{bin}/cws", "version"

release:
  github:
    owner: null3000
    name: cws-cli
